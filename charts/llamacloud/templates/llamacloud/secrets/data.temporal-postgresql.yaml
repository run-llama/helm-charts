{{- if and .Values.temporal.deploy (not .Values.temporal.disabled) }}
{{- /* Create secrets for temporal subchart using main postgresql credentials */}}
{{- /* This allows users to configure postgresql once and have temporal reuse it */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-postgresql-secret
  namespace: {{ .Release.Namespace | quote }}
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  # Hook annotations ensure the secret is applied before the temporal-subchart
  # schema Job (pre-install,pre-upgrade hook-weight 0). Without this, first
  # installs deadlock: the Job mounts this secret and gets stuck on
  # CreateContainerConfigError before helm reaches non-hook manifests.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- include "llamacloud.annotations" (dict "root" $) | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.postgresql.password | b64enc | quote }}
{{- end }}
