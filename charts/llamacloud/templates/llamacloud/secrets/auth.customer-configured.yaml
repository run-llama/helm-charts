{{- if (((.Values.config).authentication).customerConfigured).enabled }}
{{- if not (((.Values.config).authentication).customerConfigured).secret }}
apiVersion: v1
kind: Secret
metadata:
  name: customer-configured-auth-secret
  namespace: {{ $.Release.Namespace | quote }}
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "root" $) | indent 4 }}
data:
  BYOC_AUTH_MODE: {{ print "customer-configured" | b64enc | quote }}
  WORKOS_OIDC_DISCOVERY_URL: {{ required ".Values.config.authentication.customerConfigured.oidcDiscoveryUrl is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).oidcDiscoveryUrl | b64enc | quote }}
  WORKOS_CLI_CLIENT_ID: {{ required ".Values.config.authentication.customerConfigured.cliClientId is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).cliClientId | b64enc | quote }}
  WORKOS_WEB_CLIENT_ID: {{ required ".Values.config.authentication.customerConfigured.webClientId is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).webClientId | b64enc | quote }}
  WORKOS_COOKIE_PASSWORD: {{ required ".Values.config.authentication.customerConfigured.cookiePassword is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).cookiePassword | b64enc | quote }}
  WORKOS_API_KEY: {{ required ".Values.config.authentication.customerConfigured.apiKey is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).apiKey | b64enc | quote }}
  WORKOS_REDIRECT_URI: {{ required ".Values.config.authentication.customerConfigured.redirectUri is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).redirectUri | b64enc | quote }}
  WORKOS_FRONTEND_URL: {{ required ".Values.config.authentication.customerConfigured.frontendUrl is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).frontendUrl | b64enc | quote }}
  FRONTEND_URL: {{ required ".Values.config.authentication.customerConfigured.frontendUrl is required when customer-configured auth is enabled and no secret is provided" (((.Values.config).authentication).customerConfigured).frontendUrl | b64enc | quote }}
  {{- with (((.Values.config).authentication).customerConfigured).baseUrl }}
  WORKOS_BASE_URL: {{ . | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
