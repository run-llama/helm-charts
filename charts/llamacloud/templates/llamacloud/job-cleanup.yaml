{{- if and (((.Values.config).temporal).searchAttributesJob).enabled .Values.temporal.deploy (not .Values.temporal.disabled) }}
{{- /*
  Pre-upgrade cleanup hook: Delete the existing temporal-search-attributes job before each upgrade.
  Job.spec.template is immutable, so any change to the job's pod template (e.g. an admin-tools
  image bump) makes Helm fail with `field is immutable` when it tries to patch the existing
  resource in place. Deleting the job here lets Helm re-create it cleanly in the main release.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-temporal-job-cleanup
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "root" $) | indent 4 }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 1
  template:
    metadata:
      labels: {{ include "llamacloud.labels" (dict "root" $) | indent 8 }}
        app.kubernetes.io/component: temporal-job-cleanup
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-job-cleanup
      containers:
      - name: cleanup
        image: {{ (((.Values.config).temporal).jobCleanup).image | default "bitnami/kubectl:latest" }}
        command:
          - /bin/sh
          - -c
          - |
            JOB_NAME="{{ .Release.Name }}-temporal-search-attributes"
            NAMESPACE="{{ .Release.Namespace }}"

            if kubectl get job "$JOB_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
              echo "Deleting existing $JOB_NAME so Helm can recreate it (spec.template is immutable)..."
              kubectl delete job "$JOB_NAME" -n "$NAMESPACE" --ignore-not-found=true
              echo "Deleted $JOB_NAME"
            else
              echo "No existing $JOB_NAME, nothing to clean up"
            fi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-job-cleanup
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "root" $) | indent 4 }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-job-cleanup
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "root" $) | indent 4 }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-job-cleanup
  labels: {{ include "llamacloud.labels" (dict "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "root" $) | indent 4 }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-job-cleanup
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-job-cleanup
  namespace: {{ .Release.Namespace }}
{{- end }}
