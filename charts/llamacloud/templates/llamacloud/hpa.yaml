{{- range $name, $component := ((include "llamacloud.components" .) | fromYaml ) }}
{{- $componentPrefix := $component.prefix }}
{{- if $component.horizontalPodAutoscalerSpec }}
{{- /* Auto-inject scaleTargetRef pointing at the component's Deployment when
       the user hasn't provided one. scaleTargetRef is required by the HPA API,
       and every component here maps 1:1 to a Deployment with the same name. */}}
{{- $spec := deepCopy $component.horizontalPodAutoscalerSpec }}
{{- if not $spec.scaleTargetRef }}
{{- $spec = set $spec "scaleTargetRef" (dict "apiVersion" "apps/v1" "kind" "Deployment" "name" $component.name) }}
{{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ print $component.name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels: {{ include "llamacloud.labels" (dict "name" $component.name "root" $) | indent 4 }}
  annotations: {{ include "llamacloud.annotations" (dict "component" $component "root" $) | indent 4 }}
spec: {{ $spec | toYaml | nindent 2 }}
{{- end }}
{{- end }}
