{{- if .Values.monitoring.serviceMonitors.enabled }}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
{{- /*
  ServiceMonitors for in-chart LlamaCloud components that expose Prometheus
  metrics at /metrics on their HTTP port. The "llamacloud.components" helper
  already filters out components whose feature flag is off (e.g. parseOcr.enabled),
  so a component appearing here is always actually deployed.

  Components on this whitelist are confirmed to serve /metrics in the SaaS
  deployment manifests (prometheus.io/scrape annotations). The layout /
  layoutV3 detection APIs are intentionally excluded today because they do
  not yet have Prometheus instrumentation; the frontend and temporal worker
  pods are excluded for the same reason.
*/}}
{{- $monitored := list "backend" "jobsService" "jobsWorker" "llamaParse" "llamaParseOcr" "usage" }}
{{- range $name, $component := ((include "llamacloud.components" .) | fromYaml) }}
{{- if has $name $monitored }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $component.name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    release: {{ $.Values.monitoring.serviceMonitors.release | quote }}
spec:
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name | quote }}
      app.kubernetes.io/name: {{ $component.name | quote }}
      app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $.Values.monitoring.serviceMonitors.interval | quote }}
      scrapeTimeout: {{ $.Values.monitoring.serviceMonitors.scrapeTimeout | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
