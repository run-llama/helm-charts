suite: mongodb-secret-tests

templates:
- ../templates/llamacloud/secrets/data.mongodb.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create mongodb secret with inline credentials
  set:
    mongodb:
      host: test-mongo
      username: mongo-user
      password: mongo-pass
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: mongodb-secret
    - equal:
        path: .data.MONGODB_HOST
        value: dGVzdC1tb25nbw==  # base64("test-mongo")
    - equal:
        path: .data.MONGODB_USER
        value: bW9uZ28tdXNlcg==  # base64("mongo-user")
    - equal:
        path: .data.MONGODB_PASSWORD
        value: bW9uZ28tcGFzcw==  # base64("mongo-pass")

- it: should default scheme to mongodb and port to 27017
  set:
    mongodb:
      host: test-mongo
      username: mongo-user
      password: mongo-pass
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - equal:
        path: .data.MONGODB_URL_SCHEME
        value: bW9uZ29kYg==  # base64("mongodb")
    - equal:
        path: .data.MONGODB_PORT
        value: MjcwMTc=  # base64("27017")

- it: should support mongodb+srv scheme
  set:
    mongodb:
      host: test-mongo
      scheme: mongodb+srv
      username: mongo-user
      password: mongo-pass
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - equal:
        path: .data.MONGODB_URL_SCHEME
        value: bW9uZ29kYitzcnY=  # base64("mongodb+srv")

- it: should skip required-field validation when mongodb_url is set
  set:
    mongodb:
      mongodb_url: mongodb://user:pass@host:27017/db
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .data.MONGODB_URL
        value: bW9uZ29kYjovL3VzZXI6cGFzc0Bob3N0OjI3MDE3L2Ri  # base64("mongodb://user:pass@host:27017/db")

- it: should not create secret when external secret name is provided
  set:
    mongodb:
      secret: my-external-mongo-secret
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when host is missing and no mongodb_url or secret
  set:
    mongodb:
      host: ""
      username: mongo-user
      password: mongo-pass
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.mongodb.host cannot be empty. Please provide a valid mongodb host

- it: should fail when username is missing and no mongodb_url or secret
  set:
    mongodb:
      host: test-mongo
      username: ""
      password: mongo-pass
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.mongodb.username cannot be empty. Please provide a valid mongodb username

- it: should fail when password is missing and no mongodb_url or secret
  set:
    mongodb:
      host: test-mongo
      username: mongo-user
      password: ""
  template: ../templates/llamacloud/secrets/data.mongodb.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.mongodb.password cannot be empty. Please provide a valid mongodb password
