suite: umbrella-secret-tests

# Covers templates/llamacloud/secret.yaml, which iterates over all components
# in `llamacloud.components` and renders a Secret for each whose `.secret`
# helper returns non-empty content.
#
# As of this writing, every component's `.secret` helper is empty, so this
# template produces zero documents. This suite asserts that fact so that any
# future change which starts emitting content from a component `.secret`
# helper fails here and forces the author to review whether the umbrella
# Secret is the right place for that content vs. a dedicated templates/llamacloud/secrets/*.yaml file.

templates:
- ../templates/llamacloud/secret.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should render no documents by default (all component .secret helpers are empty)
  template: ../templates/llamacloud/secret.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should render no documents even when features are toggled (no component .secret helper produces content)
  set:
    config:
      frontend:
        enabled: true
      parseOcr:
        enabled: true
      parseLayoutDetection:
        enabled: true
    qdrant:
      enabled: true
      url: https://qdrant.example.com
      apiKey: abc
  template: ../templates/llamacloud/secret.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should render no documents when temporal is disabled
  set:
    temporal:
      disabled: true
      deploy: false
  template: ../templates/llamacloud/secret.yaml
  asserts:
    - hasDocuments:
        count: 0
