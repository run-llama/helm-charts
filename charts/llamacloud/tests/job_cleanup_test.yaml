suite: job-cleanup-tests

templates:
- ../templates/llamacloud/job-cleanup.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - batch/v1
    - v1
    - rbac.authorization.k8s.io/v1

chart:
  appVersion: 0.0.0

tests:
- it: should not render when temporal.deploy is false (external temporal)
  set:
    temporal:
      deploy: false
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when temporal is disabled
  set:
    temporal:
      deploy: true
      disabled: true
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when searchAttributesJob is disabled
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: false
  template: ../templates/llamacloud/job-cleanup.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should render Job, ServiceAccount, Role, RoleBinding when enabled and temporal deployed
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  asserts:
    - hasDocuments:
        count: 4
    - isKind:
        of: Job
      documentIndex: 0
    - isKind:
        of: ServiceAccount
      documentIndex: 1
    - isKind:
        of: Role
      documentIndex: 2
    - isKind:
        of: RoleBinding
      documentIndex: 3

- it: Job metadata should include pre-upgrade helm hook annotations
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  documentIndex: 0
  asserts:
    - equal:
        path: .metadata.annotations["helm.sh/hook"]
        value: pre-upgrade
    - equal:
        path: .metadata.annotations["helm.sh/hook-weight"]
        value: "-5"
    - equal:
        path: .metadata.annotations["helm.sh/hook-delete-policy"]
        value: before-hook-creation,hook-succeeded
    - equal:
        path: .metadata.name
        value: test-release-temporal-job-cleanup

- it: default cleanup image is bitnami/kubectl:latest
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  documentIndex: 0
  asserts:
    - equal:
        path: .spec.template.spec.containers[0].image
        value: bitnami/kubectl:latest

- it: jobCleanup.image override should propagate to cleanup container
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
        jobCleanup:
          image: my-registry.example.com/kubectl:1.30
  template: ../templates/llamacloud/job-cleanup.yaml
  documentIndex: 0
  asserts:
    - equal:
        path: .spec.template.spec.containers[0].image
        value: my-registry.example.com/kubectl:1.30

- it: Role should grant only get and delete on batch/Jobs
  set:
    temporal:
      deploy: true
      disabled: false
    config:
      temporal:
        searchAttributesJob:
          enabled: true
  template: ../templates/llamacloud/job-cleanup.yaml
  documentIndex: 2
  asserts:
    - isKind:
        of: Role
    - equal:
        path: .rules[0].apiGroups[0]
        value: batch
    - equal:
        path: .rules[0].resources[0]
        value: jobs
    - contains:
        path: .rules[0].verbs
        content: get
    - contains:
        path: .rules[0].verbs
        content: delete
    - notContains:
        path: .rules[0].verbs
        content: create
    - notContains:
        path: .rules[0].verbs
        content: update
