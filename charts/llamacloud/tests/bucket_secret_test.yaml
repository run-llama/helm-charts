suite: bucket-secret-tests

templates:
- ../templates/llamacloud/secrets/buckets-secret.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should always render bucket-secret
  template: ../templates/llamacloud/secrets/buckets-secret.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: bucket-secret

- it: should render an empty data map when no extraEnvVariables are set
  template: ../templates/llamacloud/secrets/buckets-secret.yaml
  asserts:
    - isKind:
        of: Secret
    - isEmpty:
        path: .data

- it: should base64-encode each extraEnvVariable into the secret
  set:
    config:
      storageBuckets:
        extraEnvVariables:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: AKIA_TEST
          AWS_SECRET_ACCESS_KEY: secret_test
  template: ../templates/llamacloud/secrets/buckets-secret.yaml
  asserts:
    - equal:
        path: .data.AWS_REGION
        value: dXMtZWFzdC0x  # base64("us-east-1")
    - equal:
        path: .data.AWS_ACCESS_KEY_ID
        value: QUtJQV9URVNU  # base64("AKIA_TEST")
    - equal:
        path: .data.AWS_SECRET_ACCESS_KEY
        value: c2VjcmV0X3Rlc3Q=  # base64("secret_test")

- it: should scope secret to release namespace
  release:
    namespace: my-custom-ns
  template: ../templates/llamacloud/secrets/buckets-secret.yaml
  asserts:
    - equal:
        path: .metadata.namespace
        value: my-custom-ns
