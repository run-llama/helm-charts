suite: basic-auth-secret-tests

templates:
- ../templates/llamacloud/secrets/auth.basic-auth.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create basic-auth-secret when basic auth is enabled with inline creds
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          validEmailDomain: example.com
          jwtSecret: super-secret-jwt
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: basic-auth-secret
    - equal:
        path: .data.BYOC_AUTH_MODE
        value: YmFzaWM=  # base64("basic")
    - equal:
        path: .data.BYOC_VALID_EMAIL_DOMAIN
        value: ZXhhbXBsZS5jb20=  # base64("example.com")
    - equal:
        path: .data.BYOC_JWT_SECRET
        value: c3VwZXItc2VjcmV0LWp3dA==  # base64("super-secret-jwt")

- it: should not create secret when external basic auth secret name is provided
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          secret: my-external-basic-auth-secret
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when only OIDC is enabled
  set:
    config:
      authentication:
        oidc:
          enabled: true
        basicAuth:
          enabled: false
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when only customer-configured auth is enabled
  set:
    config:
      authentication:
        customerConfigured:
          enabled: true
        basicAuth:
          enabled: false
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when basic auth and OIDC are both enabled (mutex)
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          validEmailDomain: example.com
          jwtSecret: jwt
        oidc:
          enabled: true
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: Cannot enable more than one authentication method. Please choose basic authentication, OIDC authentication, or customer-configured authentication.

- it: should fail when basic auth and customer-configured auth are both enabled (mutex)
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          validEmailDomain: example.com
          jwtSecret: jwt
        customerConfigured:
          enabled: true
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: Cannot enable more than one authentication method. Please choose basic authentication, OIDC authentication, or customer-configured authentication.

- it: should fail when OIDC and customer-configured auth are both enabled (mutex)
  set:
    config:
      authentication:
        oidc:
          enabled: true
        customerConfigured:
          enabled: true
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: Cannot enable more than one authentication method. Please choose basic authentication, OIDC authentication, or customer-configured authentication.

- it: should fail when no auth mode is enabled
  set:
    config:
      authentication:
        basicAuth:
          enabled: false
        oidc:
          enabled: false
        customerConfigured:
          enabled: false
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: Must enable one authentication method. Please choose basic authentication, OIDC authentication, or customer-configured authentication.

- it: should fail when basic auth enabled without validEmailDomain
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          jwtSecret: jwt
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.basicAuth.validEmailDomain is required when basic auth is enabled and no secret is provided

- it: should fail when basic auth enabled without jwtSecret
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          validEmailDomain: example.com
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.basicAuth.jwtSecret is required when basic auth is enabled and no secret is provided

- it: should skip required-field validation when external basic auth secret is set
  set:
    config:
      authentication:
        basicAuth:
          enabled: true
          secret: existing-secret
          validEmailDomain: ""
          jwtSecret: ""
  template: ../templates/llamacloud/secrets/auth.basic-auth.yaml
  asserts:
    - hasDocuments:
        count: 0
