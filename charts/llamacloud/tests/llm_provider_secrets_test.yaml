suite: llm-provider-secrets-tests

# Covers the per-provider LLM API-key secret templates. The existing
# llm_provider_configs_test.yaml covers the consolidated llm.provider-configs
# secret; this suite adds happy/absent/negative-path coverage for each single-provider
# secret (llm.openai, llm.anthropic, llm.azure, llm.aws, llm.gcp, llm.gemini).

templates:
- ../templates/llamacloud/secrets/llm.openai.yaml
- ../templates/llamacloud/secrets/llm.anthropic.yaml
- ../templates/llamacloud/secrets/llm.azure.yaml
- ../templates/llamacloud/secrets/llm.aws.yaml
- ../templates/llamacloud/secrets/llm.gcp.yaml
- ../templates/llamacloud/secrets/llm.gemini.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
# ---------- OpenAI ----------
- it: openai secret is not rendered when apiKey is empty
  template: ../templates/llamacloud/secrets/llm.openai.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: openai secret renders with required key duplication when apiKey set
  set:
    config:
      llms:
        openAi:
          apiKey: sk-openai-test
  template: ../templates/llamacloud/secrets/llm.openai.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: openai-api-key-secret
    - equal:
        path: .data.OPENAI_API_KEY
        value: c2stb3BlbmFpLXRlc3Q=  # base64("sk-openai-test")
    - equal:
        path: .data.LC_OPENAI_API_KEY
        value: c2stb3BlbmFpLXRlc3Q=
    - equal:
        path: .data.EVAL_OPENAI_API_KEY
        value: c2stb3BlbmFpLXRlc3Q=
    - isNull:
        path: .data.OPENAI_BASE_URL

- it: openai secret includes OPENAI_BASE_URL when baseUrl is set
  set:
    config:
      llms:
        openAi:
          apiKey: sk-openai-test
          baseUrl: https://proxy.example.com/openai
  template: ../templates/llamacloud/secrets/llm.openai.yaml
  asserts:
    - equal:
        path: .data.OPENAI_BASE_URL
        value: aHR0cHM6Ly9wcm94eS5leGFtcGxlLmNvbS9vcGVuYWk=

# ---------- Anthropic ----------
- it: anthropic secret is not rendered when apiKey is empty
  template: ../templates/llamacloud/secrets/llm.anthropic.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: anthropic secret renders when apiKey set
  set:
    config:
      llms:
        anthropic:
          apiKey: sk-ant-test
  template: ../templates/llamacloud/secrets/llm.anthropic.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: anthropic-api-key-secret
    - equal:
        path: .data.ANTHROPIC_API_KEY
        value: c2stYW50LXRlc3Q=

- it: anthropic secret includes ANTHROPIC_BASE_URL when baseUrl is set
  set:
    config:
      llms:
        anthropic:
          apiKey: sk-ant-test
          baseUrl: https://proxy.example.com/anthropic
  template: ../templates/llamacloud/secrets/llm.anthropic.yaml
  asserts:
    - equal:
        path: .data.ANTHROPIC_BASE_URL
        value: aHR0cHM6Ly9wcm94eS5leGFtcGxlLmNvbS9hbnRocm9waWM=

# ---------- Azure OpenAI ----------
- it: azure secret is not rendered when no deployments configured
  template: ../templates/llamacloud/secrets/llm.azure.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: azure secret renders keys per deployment, uppercased and dotted
  set:
    config:
      llms:
        azureOpenAi:
          deployments:
            - model: gpt-4o
              apiKey: az-key-1
              baseUrl: https://az1.openai.azure.com
              apiVersion: "2024-06-01"
  template: ../templates/llamacloud/secrets/llm.azure.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: azure-open-ai-api-key-secret
    - equal:
        path: .data.AZURE_OPENAI_GPT_4O_API_KEY
        value: YXota2V5LTE=  # base64("az-key-1")
    - equal:
        path: .data.AZURE_OPENAI_GPT_4O_BASE_URL
        value: aHR0cHM6Ly9hejEub3BlbmFpLmF6dXJlLmNvbQ==

- it: azure secret uses deploymentName override for _DEPLOYMENT_NAME when provided
  set:
    config:
      llms:
        azureOpenAi:
          deployments:
            - model: gpt-4o
              apiKey: az-key-1
              baseUrl: https://az1.openai.azure.com
              apiVersion: "2024-06-01"
              deploymentName: custom-deployment
  template: ../templates/llamacloud/secrets/llm.azure.yaml
  asserts:
    - equal:
        path: .data.AZURE_OPENAI_GPT_4O_DEPLOYMENT_NAME
        value: Y3VzdG9tLWRlcGxveW1lbnQ=  # base64("custom-deployment")

- it: azure secret fails when a deployment is missing required fields
  set:
    config:
      llms:
        azureOpenAi:
          deployments:
            - model: gpt-4o
              apiKey: az-key-1
              # baseUrl and apiVersion intentionally missing
  template: ../templates/llamacloud/secrets/llm.azure.yaml
  asserts:
    - failedTemplate:
        errorPattern: "is missing required fields: model, apiKey, baseUrl, or apiVersion"

- it: azure secret renders keys for multiple deployments
  set:
    config:
      llms:
        azureOpenAi:
          deployments:
            - model: gpt-4o
              apiKey: az-key-1
              baseUrl: https://az1.openai.azure.com
              apiVersion: "2024-06-01"
            - model: gpt-4o-mini
              apiKey: az-key-2
              baseUrl: https://az2.openai.azure.com
              apiVersion: "2024-06-01"
  template: ../templates/llamacloud/secrets/llm.azure.yaml
  asserts:
    - equal:
        path: .data.AZURE_OPENAI_GPT_4O_API_KEY
        value: YXota2V5LTE=
    - equal:
        path: .data.AZURE_OPENAI_GPT_4O_MINI_API_KEY
        value: YXota2V5LTI=

# ---------- AWS Bedrock ----------
- it: aws bedrock secret is not rendered when region is empty
  template: ../templates/llamacloud/secrets/llm.aws.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: aws bedrock secret renders when region is set, even without explicit credentials
  # Region-only config is valid when IRSA / instance role provides credentials.
  set:
    config:
      llms:
        awsBedrock:
          region: us-east-1
  template: ../templates/llamacloud/secrets/llm.aws.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: aws-bedrock-api-key-secret
    - equal:
        path: .data.AWS_BEDROCK_REGION
        value: dXMtZWFzdC0x  # base64("us-east-1")
    - equal:
        path: .data.AWS_BEDROCK_ENABLED
        value: dHJ1ZQ==  # base64("true")
    - isNull:
        path: .data.AWS_BEDROCK_ACCESS_KEY_ID
    - isNull:
        path: .data.AWS_BEDROCK_SECRET_ACCESS_KEY

- it: aws bedrock secret includes explicit access-key credentials when provided
  set:
    config:
      llms:
        awsBedrock:
          region: us-east-1
          accessKeyId: AKIATEST
          secretAccessKey: s3cret
  template: ../templates/llamacloud/secrets/llm.aws.yaml
  asserts:
    - equal:
        path: .data.AWS_BEDROCK_ACCESS_KEY_ID
        value: QUtJQVRFU1Q=
    - equal:
        path: .data.AWS_BEDROCK_SECRET_ACCESS_KEY
        value: czNjcmV0

- it: aws bedrock secret mirrors sonnet version name into all four historical env vars
  # There are four duplicate env vars per model so older and newer client code both resolve.
  set:
    config:
      llms:
        awsBedrock:
          region: us-east-1
          sonnet4_5ModelVersionName: anthropic.claude-sonnet-4-5-20250929-v1:0
  template: ../templates/llamacloud/secrets/llm.aws.yaml
  asserts:
    - equal:
        path: .data.AWS_BEDROCK_SONNET_4_5_MODEL_VERSION_NAME
        value: YW50aHJvcGljLmNsYXVkZS1zb25uZXQtNC01LTIwMjUwOTI5LXYxOjA=
    - equal:
        path: .data.BEDROCK_ANTHROPIC_SONNET_4_5_VERSION_NAME
        value: YW50aHJvcGljLmNsYXVkZS1zb25uZXQtNC01LTIwMjUwOTI5LXYxOjA=
    - equal:
        path: .data.BEDROCK_ANTHROPIC_SONNET_4_5_MODEL_ID
        value: YW50aHJvcGljLmNsYXVkZS1zb25uZXQtNC01LTIwMjUwOTI5LXYxOjA=

# ---------- Google Vertex AI ----------
- it: gcp vertex secret is not rendered when projectId is missing
  set:
    config:
      llms:
        googleVertexAi:
          location: us-central1
          credentialsJson: "{}"
  template: ../templates/llamacloud/secrets/llm.gcp.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: gcp vertex secret is not rendered when credentialsJson is missing
  set:
    config:
      llms:
        googleVertexAi:
          projectId: my-project
          location: us-central1
  template: ../templates/llamacloud/secrets/llm.gcp.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: gcp vertex secret is not rendered when location is missing
  set:
    config:
      llms:
        googleVertexAi:
          projectId: my-project
          credentialsJson: "{}"
  template: ../templates/llamacloud/secrets/llm.gcp.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: gcp vertex secret renders when all three required fields set
  set:
    config:
      llms:
        googleVertexAi:
          projectId: my-project
          location: us-central1
          credentialsJson: "{\"type\":\"service_account\"}"
  template: ../templates/llamacloud/secrets/llm.gcp.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: google-vertex-ai-api-key-secret
    - equal:
        path: .data.GOOGLE_VERTEX_AI_PROJECT_ID
        value: bXktcHJvamVjdA==
    - equal:
        path: .data.GOOGLE_VERTEX_AI_LOCATION
        value: dXMtY2VudHJhbDE=
    - equal:
        path: .data.GOOGLE_VERTEX_AI_ENABLED
        value: dHJ1ZQ==
    - isNull:
        path: .data.GOOGLE_VERTEX_AI_BASE_URL

- it: gcp vertex secret includes GOOGLE_VERTEX_AI_BASE_URL when baseUrl set
  set:
    config:
      llms:
        googleVertexAi:
          projectId: my-project
          location: us-central1
          credentialsJson: "{}"
          baseUrl: https://proxy.example.com/vertex
  template: ../templates/llamacloud/secrets/llm.gcp.yaml
  asserts:
    - equal:
        path: .data.GOOGLE_VERTEX_AI_BASE_URL
        value: aHR0cHM6Ly9wcm94eS5leGFtcGxlLmNvbS92ZXJ0ZXg=

# ---------- Gemini ----------
- it: gemini secret is not rendered when apiKey is empty
  template: ../templates/llamacloud/secrets/llm.gemini.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: gemini secret renders when apiKey set
  set:
    config:
      llms:
        gemini:
          apiKey: gm-key-test
  template: ../templates/llamacloud/secrets/llm.gemini.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: gemini-api-key-secret
    - equal:
        path: .data.GOOGLE_GEMINI_API_KEY
        value: Z20ta2V5LXRlc3Q=

- it: gemini secret includes GOOGLE_GEMINI_BASE_URL when baseUrl set
  set:
    config:
      llms:
        gemini:
          apiKey: gm-key-test
          baseUrl: https://proxy.example.com/gemini
  template: ../templates/llamacloud/secrets/llm.gemini.yaml
  asserts:
    - equal:
        path: .data.GOOGLE_GEMINI_BASE_URL
        value: aHR0cHM6Ly9wcm94eS5leGFtcGxlLmNvbS9nZW1pbmk=
