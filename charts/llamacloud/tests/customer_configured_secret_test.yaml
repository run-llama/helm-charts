suite: customer-configured-secret-tests

templates:
- ../templates/llamacloud/secrets/auth.customer-configured.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should not render when customer-configured auth is disabled
  set:
    config:
      authentication:
        customerConfigured:
          enabled: false
        oidc:
          enabled: true
  template: ../templates/llamacloud/secrets/auth.customer-configured.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should create customer-configured-auth-secret when enabled with inline configuration
  set:
    config:
      authentication:
        customerConfigured:
          enabled: true
          oidcDiscoveryUrl: https://auth.example.com/.well-known/openid-configuration
          cliClientId: cli_123
          webClientId: web_456
          cookiePassword: cookie-secret-32-characters-long
          apiKey: sk_test_123
          redirectUri: https://app.example.com/api/v1/auth/workos/callback
          frontendUrl: https://app.example.com
          baseUrl: https://api.workos.test
  template: ../templates/llamacloud/secrets/auth.customer-configured.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: customer-configured-auth-secret
    - equal:
        path: .data.BYOC_AUTH_MODE
        value: Y3VzdG9tZXItY29uZmlndXJlZA==  # base64("customer-configured")
    - equal:
        path: .data.WORKOS_OIDC_DISCOVERY_URL
        value: aHR0cHM6Ly9hdXRoLmV4YW1wbGUuY29tLy53ZWxsLWtub3duL29wZW5pZC1jb25maWd1cmF0aW9u
    - equal:
        path: .data.WORKOS_CLI_CLIENT_ID
        value: Y2xpXzEyMw==
    - equal:
        path: .data.WORKOS_WEB_CLIENT_ID
        value: d2ViXzQ1Ng==
    - equal:
        path: .data.WORKOS_COOKIE_PASSWORD
        value: Y29va2llLXNlY3JldC0zMi1jaGFyYWN0ZXJzLWxvbmc=
    - equal:
        path: .data.WORKOS_API_KEY
        value: c2tfdGVzdF8xMjM=
    - equal:
        path: .data.WORKOS_REDIRECT_URI
        value: aHR0cHM6Ly9hcHAuZXhhbXBsZS5jb20vYXBpL3YxL2F1dGgvd29ya29zL2NhbGxiYWNr
    - equal:
        path: .data.WORKOS_FRONTEND_URL
        value: aHR0cHM6Ly9hcHAuZXhhbXBsZS5jb20=
    - equal:
        path: .data.FRONTEND_URL
        value: aHR0cHM6Ly9hcHAuZXhhbXBsZS5jb20=
    - equal:
        path: .data.WORKOS_BASE_URL
        value: aHR0cHM6Ly9hcGkud29ya29zLnRlc3Q=

- it: should not render when external customer-configured secret name is provided
  set:
    config:
      authentication:
        customerConfigured:
          enabled: true
          secret: existing-customer-configured-auth-secret
  template: ../templates/llamacloud/secrets/auth.customer-configured.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when customer-configured auth is enabled without oidcDiscoveryUrl
  set:
    config:
      authentication:
        customerConfigured:
          enabled: true
          cliClientId: cli
          webClientId: web
          cookiePassword: cookie
          apiKey: key
          redirectUri: https://app.example.com/api/v1/auth/workos/callback
          frontendUrl: https://app.example.com
  template: ../templates/llamacloud/secrets/auth.customer-configured.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.customerConfigured.oidcDiscoveryUrl is required when customer-configured auth is enabled and no secret is provided

