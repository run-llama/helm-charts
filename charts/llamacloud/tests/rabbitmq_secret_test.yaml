suite: rabbitmq-secret-tests

templates:
- ../templates/llamacloud/secrets/data.rabbitmq.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create rabbitmq secret with inline fields
  set:
    rabbitmq:
      host: test-rabbit
      username: rabbit-user
      password: rabbit-pass
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: rabbitmq-secret
    - equal:
        path: .data.JOB_QUEUE_USERNAME
        value: cmFiYml0LXVzZXI=  # base64("rabbit-user")
    - equal:
        path: .data.JOB_QUEUE_PASSWORD
        value: cmFiYml0LXBhc3M=  # base64("rabbit-pass")

- it: should build default amqp endpoint on port 5672 when scheme/port unset
  set:
    rabbitmq:
      host: test-rabbit
      username: rabbit-user
      password: rabbit-pass
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - equal:
        path: .data.JOB_QUEUE_ENDPOINT
        value: YW1xcDovL3Rlc3QtcmFiYml0OjU2NzI=  # base64("amqp://test-rabbit:5672")

- it: should support amqps scheme and custom port
  set:
    rabbitmq:
      host: test-rabbit
      scheme: amqps
      port: "5671"
      username: rabbit-user
      password: rabbit-pass
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - equal:
        path: .data.JOB_QUEUE_ENDPOINT
        value: YW1xcHM6Ly90ZXN0LXJhYmJpdDo1Njcx  # base64("amqps://test-rabbit:5671")

- it: should prefer connectionString over inline fields
  set:
    rabbitmq:
      connectionString: amqp://user:pass@rabbit.example.com:5672/vhost
      host: should-be-ignored
      username: should-be-ignored
      password: should-be-ignored
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - equal:
        path: .data.JOB_QUEUE_CONNECTION_STRING
        value: YW1xcDovL3VzZXI6cGFzc0ByYWJiaXQuZXhhbXBsZS5jb206NTY3Mi92aG9zdA==
    - isNull:
        path: .data.JOB_QUEUE_ENDPOINT
    - isNull:
        path: .data.JOB_QUEUE_USERNAME
    - isNull:
        path: .data.JOB_QUEUE_PASSWORD

- it: should not create secret when external secret name is provided
  set:
    rabbitmq:
      secret: my-external-rabbit-secret
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when host missing and no connectionString or secret
  set:
    rabbitmq:
      host: ""
      username: rabbit-user
      password: rabbit-pass
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.rabbitmq.host cannot be empty. Please provide a valid rabbitmq host or connection string

- it: should fail when username missing and no connectionString or secret
  set:
    rabbitmq:
      host: test-rabbit
      username: ""
      password: rabbit-pass
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.rabbitmq.username cannot be empty. Please provide a valid rabbitmq username or connection string

- it: should fail when password missing and no connectionString or secret
  set:
    rabbitmq:
      host: test-rabbit
      username: rabbit-user
      password: ""
  template: ../templates/llamacloud/secrets/data.rabbitmq.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.rabbitmq.password cannot be empty. Please provide a valid rabbitmq password or connection string
