suite: agent-backend-egress-networkpolicy-tests

templates:
- ../templates/agent-backend-egress-networkpolicy.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - networking.k8s.io/v1

chart:
  appVersion: 0.0.0

tests:
- it: should render when llamaAgents.deploy is true and allowBackendEgress defaults to true
  set:
    llamaAgents:
      deploy: true
  asserts:
    - isKind:
        of: NetworkPolicy
    - equal:
        path: .metadata.name
        value: test-release-agent-backend-egress
    - equal:
        path: .metadata.namespace
        value: llama-agents
    - equal:
        path: .spec.podSelector.matchLabels["app.kubernetes.io/managed-by"]
        value: llama-deploy-operator
    - contains:
        path: .spec.policyTypes
        content: Egress
    - equal:
        path: .spec.egress[0].to[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
        value: test-namespace
    - equal:
        path: .spec.egress[0].to[0].podSelector.matchLabels["app.kubernetes.io/name"]
        value: llamacloud
    - equal:
        path: .spec.egress[0].to[0].podSelector.matchLabels["app.kubernetes.io/instance"]
        value: test-release
    - equal:
        path: .spec.egress[0].ports[0].protocol
        value: TCP
    - equal:
        path: .spec.egress[0].ports[0].port
        value: 8000

- it: should not render when allowBackendEgress is false
  set:
    llamaAgents:
      deploy: true
      allowBackendEgress: false
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when llamaAgents.deploy is false
  set:
    llamaAgents:
      deploy: false
      allowBackendEgress: true
  asserts:
    - hasDocuments:
        count: 0

- it: should render in the subchart apps namespace when configured
  set:
    llamaAgents:
      deploy: true
    llama-agents-subchart:
      apps:
        namespace: llama-agents-apps
  asserts:
    - equal:
        path: .metadata.namespace
        value: llama-agents-apps
