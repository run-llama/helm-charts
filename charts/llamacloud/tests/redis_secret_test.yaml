suite: redis-secret-tests

templates:
- ../templates/llamacloud/secrets/data.redis.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create redis secret with correct default scheme
  set:
    redis:
      host: test-redis
      port: "6379"
      password: test-pass
  template: ../templates/llamacloud/secrets/data.redis.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: redis-secret
    # REDIS_SCHEME should default to "redis", not a port number
    - equal:
        path: .data.REDIS_SCHEME
        value: "cmVkaXM="  # base64("redis")
    - equal:
        path: .data.REDIS_PORT
        value: "NjM3OQ=="  # base64("6379")

- it: should use custom redis scheme when provided
  set:
    redis:
      host: test-redis
      port: "6380"
      scheme: rediss
      password: test-pass
  template: ../templates/llamacloud/secrets/data.redis.yaml
  asserts:
    - equal:
        path: .data.REDIS_SCHEME
        value: "cmVkaXNz"  # base64("rediss")

- it: should not create redis secret when custom secret name is provided
  set:
    redis:
      secret: my-custom-redis-secret
  template: ../templates/llamacloud/secrets/data.redis.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should encode all redis fields correctly
  set:
    redis:
      host: my-redis.example.com
      port: "6380"
      scheme: rediss
      db: 2
      username: redis-user
      password: redis-pass
  template: ../templates/llamacloud/secrets/data.redis.yaml
  asserts:
    - equal:
        path: .data.REDIS_HOST
        value: "bXktcmVkaXMuZXhhbXBsZS5jb20="  # base64("my-redis.example.com")
    - equal:
        path: .data.REDIS_PORT
        value: "NjM4MA=="  # base64("6380")
    - equal:
        path: .data.REDIS_DB
        value: "Mg=="  # base64("2")
