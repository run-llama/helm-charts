suite: postgresql-secret-tests

templates:
- ../templates/llamacloud/secrets/data.postgresql.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create postgresql secret with inline credentials
  set:
    postgresql:
      host: test-pg
      database: test-db
      username: test-user
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: postgresql-secret
    - equal:
        path: .data.DATABASE_HOST
        value: dGVzdC1wZw==  # base64("test-pg")
    - equal:
        path: .data.DATABASE_NAME
        value: dGVzdC1kYg==  # base64("test-db")
    - equal:
        path: .data.DATABASE_USER
        value: dGVzdC11c2Vy  # base64("test-user")
    - equal:
        path: .data.DATABASE_PASSWORD
        value: dGVzdC1wYXNz  # base64("test-pass")

- it: should default port to 5432 when not set
  set:
    postgresql:
      host: test-pg
      database: test-db
      username: test-user
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - equal:
        path: .data.DATABASE_PORT
        value: NTQzMg==  # base64("5432")

- it: should encode custom port
  set:
    postgresql:
      host: test-pg
      port: "6543"
      database: test-db
      username: test-user
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - equal:
        path: .data.DATABASE_PORT
        value: NjU0Mw==  # base64("6543")

- it: should not create secret when external secret name is provided
  set:
    postgresql:
      secret: my-external-pg-secret
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when host is missing
  set:
    postgresql:
      host: ""
      database: test-db
      username: test-user
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.postgresql.host cannot be empty. Please provide a valid postgres host

- it: should fail when database is missing
  set:
    postgresql:
      host: test-pg
      database: ""
      username: test-user
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.postgresql.database cannot be empty. Please provide a valid postgres database

- it: should fail when username is missing
  set:
    postgresql:
      host: test-pg
      database: test-db
      username: ""
      password: test-pass
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.postgresql.username cannot be empty. Please provide a valid postgres username

- it: should fail when password is missing
  set:
    postgresql:
      host: test-pg
      database: test-db
      username: test-user
      password: ""
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.postgresql.password cannot be empty. Please provide a valid postgres password

- it: should skip required-field validation when external secret is set even if creds are empty
  set:
    postgresql:
      secret: existing-secret
      host: ""
      database: ""
      username: ""
      password: ""
  template: ../templates/llamacloud/secrets/data.postgresql.yaml
  asserts:
    - hasDocuments:
        count: 0
