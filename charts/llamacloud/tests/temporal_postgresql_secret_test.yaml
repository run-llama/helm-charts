suite: temporal-postgresql-secret-tests

templates:
- ../templates/llamacloud/secrets/data.temporal-postgresql.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should create temporal-postgresql-secret reusing main postgresql password when temporal.deploy is true
  set:
    temporal:
      deploy: true
      disabled: false
    postgresql:
      password: main-pg-pass
  template: ../templates/llamacloud/secrets/data.temporal-postgresql.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: temporal-postgresql-secret
    - equal:
        path: .type
        value: Opaque
    - equal:
        path: .data.password
        value: bWFpbi1wZy1wYXNz  # base64("main-pg-pass")

- it: should not render when temporal.deploy is false (external temporal)
  set:
    temporal:
      deploy: false
      disabled: false
    postgresql:
      password: main-pg-pass
  template: ../templates/llamacloud/secrets/data.temporal-postgresql.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should not render when temporal is disabled
  set:
    temporal:
      deploy: false
      disabled: true
    postgresql:
      password: main-pg-pass
  template: ../templates/llamacloud/secrets/data.temporal-postgresql.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should scope to release namespace
  release:
    namespace: custom-ns
  set:
    temporal:
      deploy: true
      disabled: false
    postgresql:
      password: main-pg-pass
  template: ../templates/llamacloud/secrets/data.temporal-postgresql.yaml
  asserts:
    - equal:
        path: .metadata.namespace
        value: custom-ns

# Regression: first install of the chart into an empty namespace deadlocked
# because the temporal-subchart schema Job (helm.sh/hook: pre-install,pre-upgrade,
# weight 0) mounted this secret, but the secret had no hook annotations and was
# only applied after pre-install hooks completed — chicken and egg. The secret
# must run in the same hook phase, at lower weight, so it's created before the
# Job pod starts. Delete policy is before-hook-creation only (NOT hook-succeeded)
# because temporal server pods mount this secret continuously after install.
- it: should be applied as a pre-install/pre-upgrade hook ahead of the schema Job
  set:
    temporal:
      deploy: true
      disabled: false
    postgresql:
      password: main-pg-pass
  template: ../templates/llamacloud/secrets/data.temporal-postgresql.yaml
  asserts:
    - equal:
        path: .metadata.annotations["helm.sh/hook"]
        value: pre-install,pre-upgrade
    - equal:
        path: .metadata.annotations["helm.sh/hook-weight"]
        value: "-10"
    - equal:
        path: .metadata.annotations["helm.sh/hook-delete-policy"]
        value: before-hook-creation
