suite: oidc-secret-tests

templates:
- ../templates/llamacloud/secrets/auth.oidc.yaml

release:
  name: test-release
  namespace: test-namespace

capabilities:
  majorVersion: 1
  minorVersion: 31
  apiVersions:
    - v1

chart:
  appVersion: 0.0.0

tests:
- it: should not render when OIDC is disabled
  set:
    config:
      authentication:
        oidc:
          enabled: false
        basicAuth:
          enabled: true
          validEmailDomain: example.com
          jwtSecret: j
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should create oidc-secret when OIDC enabled with inline credentials
  set:
    config:
      authentication:
        oidc:
          enabled: true
          discoveryUrl: https://idp.example.com/.well-known/openid-configuration
          clientId: llamacloud-client
          clientSecret: oidc-client-secret-value
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - isKind:
        of: Secret
    - equal:
        path: .metadata.name
        value: oidc-secret
    - equal:
        path: .data.OIDC_DISCOVERY_URL
        value: aHR0cHM6Ly9pZHAuZXhhbXBsZS5jb20vLndlbGwta25vd24vb3BlbmlkLWNvbmZpZ3VyYXRpb24=
    - equal:
        path: .data.OIDC_CLIENT_ID
        value: bGxhbWFjbG91ZC1jbGllbnQ=
    - equal:
        path: .data.OIDC_CLIENT_SECRET
        value: b2lkYy1jbGllbnQtc2VjcmV0LXZhbHVl
    - isNotEmpty:
        path: .data.SESSION_SECRET_KEY

- it: should not render when external OIDC secret name is provided
  set:
    config:
      authentication:
        oidc:
          enabled: true
          secret: my-external-oidc-secret
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - hasDocuments:
        count: 0

- it: should fail when OIDC enabled without discoveryUrl
  set:
    config:
      authentication:
        oidc:
          enabled: true
          clientId: c
          clientSecret: s
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.oidc.discoveryUrl is required when OIDC is enabled and no secret is provided

- it: should fail when OIDC enabled without clientId
  set:
    config:
      authentication:
        oidc:
          enabled: true
          discoveryUrl: https://idp.example.com/
          clientSecret: s
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.oidc.clientId is required when OIDC is enabled and no secret is provided

- it: should fail when OIDC enabled without clientSecret
  set:
    config:
      authentication:
        oidc:
          enabled: true
          discoveryUrl: https://idp.example.com/
          clientId: c
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - failedTemplate:
        errorMessage: .Values.config.authentication.oidc.clientSecret is required when OIDC is enabled and no secret is provided

- it: SESSION_SECRET_KEY is randomly generated each render
  # The key uses randAlphaNum, so two renders produce different base64 values.
  # Assert only that it's non-empty — enforcing exact equality would be flaky.
  set:
    config:
      authentication:
        oidc:
          enabled: true
          discoveryUrl: https://idp.example.com/
          clientId: c
          clientSecret: s
  template: ../templates/llamacloud/secrets/auth.oidc.yaml
  asserts:
    - isNotEmpty:
        path: .data.SESSION_SECRET_KEY
