apiVersion: v2
name: llamacloud
description: A Helm chart to deploy LlamaCloud and all of its necessary services.

home: https://github.com/run-llama/helm-charts

sources:
- https://github.com/run-llama/helm-charts

maintainers:
- name: Jerry Liu
  email: jerry@runllama.ai
  url: https://github.com/jerryjliu
- name: Simon Suo
  email: simon@runllama.ai
  url: https://github.com/Disiok
- name: Jonathan Whitaker
  email: jonathan@runllama.ai
  url: https://github.com/jonathan-whitaker

keywords:
- llamaindex
- llamacloud
- rag

version: 0.8.3
appVersion: "0.8.3"

dependencies:
  - name: temporal
    version: ~1.2.0
    repository: https://go.temporal.io/helm-charts
    condition: temporal.deploy
    alias: temporal-subchart
  - name: llama-agents
    version: ~0.12.2
    repository: oci://registry-1.docker.io/llamaindex
    condition: llamaAgents.deploy
    alias: llama-agents-subchart
  - name: bifrost
    version: ~2.1.21
    repository: https://maximhq.github.io/bifrost/helm-charts
    condition: bifrost.deploy
    alias: bifrost-subchart
  - name: kube-prometheus-stack
    version: ~85.0.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.deploy
    alias: kube-prometheus-stack-subchart
